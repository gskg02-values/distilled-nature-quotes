    <meta charset="UTF-8">

    <title>Nature Distilled | THE UNSAID LENS</title>
    
    <meta name="description" content="A premium gallery of 105 nature-distilled reflections.">

    <style>
        /* ============================================================
           HEADER 1: COLORS & GLOBAL THEME
           ============================================================ */
        :root {
            --bg-color: #F0E0D0; /* Butterscotch Sand */
            --accent-color: #6C0000; /* Deep Oxblood */
            --glass-bg: rgba(255, 255, 255, 0.2); /* Frosted Glass */
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-color);
            color: var(--accent-color);
            font-family: 'Georgia', serif;
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        /* ============================================================
           HEADER 2: FLOATING NAVIGATION ARROWS
           ============================================================ */
        .nav-controls {
            position: fixed; right: 25px; bottom: 40px;
            display: flex; flex-direction: column; gap: 15px; z-index: 1000;
        }

        .nav-btn {
            width: 45px; height: 45px; border-radius: 50%;
            border: 1px solid var(--accent-color);
            background: rgba(240, 224, 208, 0.8);
            color: var(--accent-color);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; font-size: 1.2rem; transition: 0.3s ease;
        }

        .nav-btn:hover { background: var(--accent-color); color: var(--bg-color); }

        /* ============================================================
           HEADER 3: COVER PAGE & MANTRA
           ============================================================ */
        .cover-section {
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px; box-sizing: border-box;
        }

        .cover-image {
            max-width: 350px; width: 70%;
            border: 1px solid var(--accent-color);
            box-shadow: 0 10px 40px rgba(108, 0, 0, 0.1);
        }

        .mantra-box { margin-top: 40px; }
        .mantra-text { font-style: italic; letter-spacing: 2px; opacity: 0.8; margin-bottom: 20px; }
        .scroll-hint { text-transform: uppercase; font-size: 0.8rem; letter-spacing: 4px; }

        /* ============================================================
           HEADER 4: QUOTE GALLERY & FADE LOGIC
           ============================================================ */
        .gallery-container { width: 90%; max-width: 800px; padding: 100px 0; }

        .quote-card {
            margin-bottom: 250px; /* High space for focused reflection */
            padding: 25px;
            background: var(--glass-bg);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(8px); /* Premium Glassmorphism */
            text-align: center;

            /* Initial state for Fading sensor */
            opacity: 0;
            transform: translateY(50px);
            transition: opacity 1.5s ease, transform 1.2s ease;
        }

        .quote-card.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .quote-card img { width: 100%; height: auto; border-radius: 15px; }

        .share-btn {
            margin-top: 20px; background: transparent; border: none;
            color: var(--accent-color); font-family: inherit; font-size: 0.75rem;
            letter-spacing: 2px; cursor: pointer; text-decoration: underline; opacity: 0.5;
        }
        .share-btn:hover { opacity: 1; }

        footer { padding: 80px; text-align: center; font-size: 0.8rem; border-top: 1px solid rgba(108, 0, 0, 0.1); width: 100%; opacity: 0.5; }

        @media (max-width: 600px) {
            .quote-card { margin-bottom: 150px; padding: 15px; }
            .nav-controls { right: 15px; bottom: 20px; }
        }
    </style>
</head>

    <script>
        // 1. FADE SENSOR (Intersection Observer)
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('is-visible');
                } else {
                    entry.target.classList.remove('is-visible');
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.quote-card').forEach(card => observer.observe(card));

        // 2. SHARE LOGIC (Let it Spread)
        async function shareIt(id) {
            const shareData = {
                title: 'Nature Distilled Reflection',
                text: 'Thought-provoking value from THE UNSAID LENS.',
                url: window.location.href.split('#')[0] + '#' + id
            };
            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(shareData.url);
                    alert("Thought Link copied to clipboard.");
                }
            } catch (err) { console.log(err); }
        }
    </script>
